# NOTE: Host values and certificate ARN are updated automatically by:
#   ./scripts/generate-config.sh dev
# Do NOT manually edit host values or certificate-arn — they are injected from
# terraform outputs and terraform.tfvars after every terraform apply.
#
# PLACEHOLDER_GRAFANA_HOST  → e.g. grafana-dev.your-domain.com
# PLACEHOLDER_ARGOCD_HOST   → e.g. argocd-dev.your-domain.com
# CERT_ARN_PLACEHOLDER      → your ACM certificate ARN from terraform output

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: CERT_ARN_PLACEHOLDER
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/group.name: petclinic-monitoring
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-port: "3000"
spec:
  ingressClassName: alb
  rules:
    - host: PLACEHOLDER_GRAFANA_HOST
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: CERT_ARN_PLACEHOLDER
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/group.name: petclinic-monitoring
    # ArgoCD runs with --insecure flag (HTTP backend, TLS terminated at ALB)
    # Do NOT use backend-protocol: HTTPS here — that would conflict with --insecure mode
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
spec:
  ingressClassName: alb
  rules:
    - host: PLACEHOLDER_ARGOCD_HOST
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
