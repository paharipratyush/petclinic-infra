apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-storage
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 2Gi
---
# ── Alertmanager config stored as K8s Secret ─────────────────────────────────
# Using Secret instead of ConfigMap prevents credentials from appearing
# in plain text. Credentials are injected at deploy time from AWS Secrets
# Manager by setup-cluster.sh — never committed to Git.
# Placeholders ALERTMANAGER_EMAIL_PLACEHOLDER and
# ALERTMANAGER_PASSWORD_PLACEHOLDER are replaced at deploy time.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'ALERTMANAGER_EMAIL_PLACEHOLDER'
      smtp_auth_username: 'ALERTMANAGER_EMAIL_PLACEHOLDER'
      smtp_auth_password: 'ALERTMANAGER_PASSWORD_PLACEHOLDER'
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'critical-alerts'
          group_wait: 0s
          repeat_interval: 1h
        - matchers:
            - severity = "warning"
          receiver: 'warning-alerts'
          group_wait: 30s
          repeat_interval: 4h

    receivers:
      - name: 'null'
      - name: 'critical-alerts'
        email_configs:
          - to: 'ALERTMANAGER_EMAIL_PLACEHOLDER'
            send_resolved: true
            headers:
              Subject: '[CRITICAL] Petclinic Alert: {{ .GroupLabels.alertname }}'
      - name: 'warning-alerts'
        email_configs:
          - to: 'ALERTMANAGER_EMAIL_PLACEHOLDER'
            send_resolved: true
            headers:
              Subject: '[WARNING] Petclinic Alert: {{ .GroupLabels.alertname }}'

    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ['alertname', 'namespace']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--web.external-url=http://alertmanager.monitoring:9093'
          ports:
            - containerPort: 9093
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          secret:
            secretName: alertmanager-config
        - name: storage
          persistentVolumeClaim:
            claimName: alertmanager-storage
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
