# Default values — overridden by per-service and per-environment values files

replicaCount: 1

image:
  repository: ""
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  startup:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
  readiness:
    path: /actuator/health/readiness
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    path: /actuator/health/liveness
    periodSeconds: 15
    failureThreshold: 3

env: []
envFrom: []
initContainers: []

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceAccount:
  create: true
  annotations: {}
