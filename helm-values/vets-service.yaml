image:
  # Filled automatically by scripts/generate-config.sh after terraform apply
  repository: PLACEHOLDER_ECR_REGISTRY/petclinic-dev/vets-service
  tag: v1.0.0
service:
  port: 8083
# HA in prod — 2 replicas minimum
replicaCount: 2
env:
  - name: SPRING_PROFILES_ACTIVE
    # production profile is REQUIRED for Caffeine cache
    # CacheConfig is gated on @Profile("production") — cache only works with this profile
    value: "docker,mysql,production"
  - name: CONFIG_SERVER_URL
    value: "http://config-server:8888"
  # Filled automatically by scripts/generate-config.sh after terraform apply
  - name: SPRING_DATASOURCE_URL
    value: "PLACEHOLDER_JDBC_URL"
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: rds-credentials
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: rds-credentials
        key: password
  - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
    value: "http://zipkin.tracing:9411/api/v2/spans"
  - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
    value: "1.0"
initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - 'until wget -qO- http://config-server:8888/actuator/health; do echo "waiting for config-server..."; sleep 5; done'
  - name: wait-for-discovery-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - 'until wget -qO- http://discovery-server:8761/actuator/health; do echo "waiting for discovery-server..."; sleep 5; done'
