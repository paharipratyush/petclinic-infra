image:
  repository: 482352877891.dkr.ecr.ap-south-1.amazonaws.com/petclinic-prod/config-server
  tag: 60ebde6
service:
  port: 8888
# HA in prod — config-server must be highly available as all services depend on it
replicaCount: 2
probes:
  startup:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
  readiness:
    path: /actuator/health
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    path: /actuator/health
    periodSeconds: 15
    failureThreshold: 3
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "docker"
