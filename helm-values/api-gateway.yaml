image:
  # Filled automatically by scripts/generate-config.sh after terraform apply
  repository: 482352877891.dkr.ecr.ap-south-1.amazonaws.com/petclinic-dev/api-gateway
  tag: v1.0.0
service:
  port: 8080
resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi
replicaCount: 2
env:
  - name: SPRING_PROFILES_ACTIVE
    value: "docker"
  - name: CONFIG_SERVER_URL
    value: "http://config-server:8888"
  - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
    value: "http://zipkin.tracing:9411/api/v2/spans"
  - name: MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT
    value: "http://zipkin.tracing:9411/api/v2/spans"
  - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
    value: "1.0"
  - name: MANAGEMENT_METRICS_DISTRIBUTION_PERCENTILESHISTOGRAM_HTTP_SERVER_REQUESTS
    value: "true"
  - name: MANAGEMENT_METRICS_DISTRIBUTION_SLO_HTTP_SERVER_REQUESTS
    value: "50ms,100ms,200ms,500ms,1s,2s"
  - name: SPRING_CLOUD_GATEWAY_METRICS_ENABLED
    value: "true"
initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - 'until wget -qO- http://config-server:8888/actuator/health; do echo "waiting for config-server..."; sleep 5; done'
  - name: wait-for-discovery-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - 'until wget -qO- http://discovery-server:8761/actuator/health; do echo "waiting for discovery-server..."; sleep 5; done'
  - name: wait-for-zipkin
    image: busybox:1.36
    command:
      - sh
      - -c
      - until wget -qO- http://zipkin.tracing:9411/health; do echo "waiting for zipkin..."; sleep 5; done
