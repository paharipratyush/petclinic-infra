image:
  repository: 482352877891.dkr.ecr.ap-south-1.amazonaws.com/petclinic-dev/visits-service
  tag: v1.0.0

service:
  port: 8082

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "docker,mysql"
  - name: CONFIG_SERVER_URL
    value: "http://config-server:8888"
  - name: SPRING_DATASOURCE_URL
    value: "jdbc:mysql://petclinic-dev-mysql.cbsumcwgg4sm.ap-south-1.rds.amazonaws.com:3306/petclinic"
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: rds-credentials
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: rds-credentials
        key: password

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ['sh', '-c', 'until wget -qO- http://config-server:8888/actuator/health; do echo waiting for config-server; sleep 5; done']
  - name: wait-for-discovery-server
    image: busybox:1.36
    command: ['sh', '-c', 'until wget -qO- http://discovery-server:8761/actuator/health; do echo waiting for discovery-server; sleep 5; done']
  - name: wait-for-customers-service
    image: busybox:1.36
    command: ['sh', '-c', 'until wget -qO- http://customers-service:8081/actuator/health; do echo waiting for customers-service; sleep 5; done']
