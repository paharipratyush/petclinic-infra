name: Update Image Tags

on:
  repository_dispatch:
    types: [app-image-built]

jobs:
  update-tags:
    name: Update helm-values image tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tags in helm-values
        run: |
          SHA="${{ github.event.client_payload.sha }}"
          SERVICES="${{ github.event.client_payload.services }}"
          echo "Updating image tag to ${SHA} for services: ${SERVICES}"

          for SERVICE in ${SERVICES}; do
            FILE="helm-values/${SERVICE}.yaml"
            if [ -f "${FILE}" ]; then
              # yq safely targets only .image.tag — no risk of matching other fields
              yq -i ".image.tag = \"${SHA}\"" "${FILE}"
              echo "✅ Updated ${FILE} → tag: ${SHA}"
            else
              echo "⚠️  WARNING: ${FILE} not found, skipping ${SERVICE}"
            fi
          done

      - name: Commit and push updated tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-values/
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit — tags already up to date"
          else
            git commit -m "ci: update image tags to ${{ github.event.client_payload.sha }} (${{ github.event.client_payload.services }})"
            git push
            echo "✅ Committed and pushed tag updates"
          fi
