name: Update Image Tags

on:
  repository_dispatch:
    types: [app-image-built]

jobs:
  update-tags:
    name: Update helm-values image tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in helm-values
        run: |
          SHA="${{ github.event.client_payload.sha }}"
          SERVICES="${{ github.event.client_payload.services }}"
          echo "Updating image tag to ${SHA} for: ${SERVICES}"
          for SERVICE in ${SERVICES}; do
            FILE="helm-values/${SERVICE}.yaml"
            if [ -f "${FILE}" ]; then
              sed -i "s|tag:.*|tag: ${SHA}|" "${FILE}"
              echo "Updated ${FILE}"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-values/
          git diff --staged --quiet || \
            git commit -m "ci: update image tags to ${{ github.event.client_payload.sha }}"
          git push
